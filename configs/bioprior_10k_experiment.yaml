name: bioprior_10k_formal_test
description: Formal BioPrior-10K split and held-out test comparison manifest.

data:
  core_csv: data/processed/swissprot_motif_bioprior_10k.csv
  core_fasta: data/processed/swissprot_motif_bioprior_10k.fasta
  split_dir: data/processed/bioprior_10k_splits
  train_csv: data/processed/bioprior_10k_splits/train.csv
  val_csv: data/processed/bioprior_10k_splits/val.csv
  test_csv: data/processed/bioprior_10k_splits/test.csv
  test_fasta: data/processed/bioprior_10k_splits/test.fasta
  split_report: data/processed/bioprior_10k_splits/split_leakage_report.txt

structures:
  structure_dir: data/structures/afdb_bioprior_10k
  mapping_csv: data/structures/afdb_bioprior_10k_mapping.csv
  summary_txt: data/structures/afdb_bioprior_10k_summary.txt

features:
  residue_biopriors: data/features/bioprior_10k_residue_biopriors.csv
  residue_biopriors_summary: data/features/bioprior_10k_residue_biopriors_summary.txt
  test_residue_biopriors: data/features/bioprior_10k_test_residue_biopriors.csv
  segments: data/features/bioprior_10k_bioprior_segments.csv
  segments_summary: data/features/bioprior_10k_bioprior_segments_summary.txt
  segments_with_stage1_utility: data/features/bioprior_10k_bioprior_segments_with_stage1_utility.csv
  stage1_utility_summary: data/features/bioprior_10k_bioprior_segments_with_stage1_utility_summary.txt

stage1:
  checkpoint: checkpoints/stage1_deletion_prior_100k/best_model.pt
  test_metrics: results/stage1_deletion_prior_100k/test_metrics.json

planner:
  val_selected_segments: results/biodel_planner/bioprior_10k_val_v2_selected_segments.csv
  val_summary: results/biodel_planner/bioprior_10k_val_v2_summary.csv
  test_selected_segments: results/biodel_planner/bioprior_10k_test_v2_selected_segments.csv
  test_summary: results/biodel_planner/bioprior_10k_test_v2_summary.csv
  selected_operating_points: results/biodel_planner/bioprior_10k_selected_operating_points.json
  budget_risk_frontier: results/biodel_planner/bioprior_10k_budget_risk_frontier.csv
  budget_risk_report: results/biodel_planner/bioprior_10k_budget_risk_frontier_report.txt

scisor_baselines:
  root: results/scisor_bioprior_10k_test
  summary_csv: results/scisor_bioprior_10k_test/scisor_bioprior10k_test_baseline_summary.csv
  summary_txt: results/scisor_bioprior_10k_test/scisor_bioprior10k_test_baseline_summary.txt
  methods: [nomask, hardmask, hardmask_shadow02]
  budgets: [10, 20, 30]

final_comparison:
  out_dir: results/biodel_planner/final_test_comparison
  table: results/biodel_planner/final_test_comparison/final_test_comparison_table.csv
  by_budget: results/biodel_planner/final_test_comparison/final_test_comparison_by_budget.csv
  report: results/biodel_planner/final_test_comparison/final_test_comparison_report.md
  plots_dir: results/biodel_planner/final_test_comparison/plots

ablation:
  summary_csv: results/biodel_planner/bioprior_10k_ablation_summary.csv
  selected_segments: results/biodel_planner/bioprior_10k_ablation_selected_segments.csv
  report: results/biodel_planner/bioprior_10k_ablation_report.txt
  methods:
    - full_selected
    - w_o_functional_constraint
    - w_o_shadow_budget
    - w_o_closure_budget
    - w_o_structural_budget
    - w_o_stage1_utility
